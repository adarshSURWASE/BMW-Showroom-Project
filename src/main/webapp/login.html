<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BMW Login</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  width: 350px;
  padding: 30px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  color: white;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.login-box h2 {
  text-align: center;
  margin-bottom: 20px;
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
  outline: none;
}

.login-box button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #007bff;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.login-box button:hover {
  background: #0056b3;
}

.login-box p {
  text-align: center;
  margin-top: 15px;
}

.login-box a {
  color: #4da3ff;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>BMW Showroom Login</h2>

  <form action="login" method="post">
  <input type="email" name="email" placeholder="Email Address" required>
  <input type="password" name="password" placeholder="Password" required>
  <button type="submit">Login</button>
</form>

  <p>
    Don't have an account?
    <a href="register.html">Sign Up</a>
  </p>
</div>

</body>
</html>
